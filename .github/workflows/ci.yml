name: CI

# Pull-request quality gate. Every PR targeting `main` must pass this workflow
# before it can be merged (enforce via branch protection — see docs/ci.md).
# Also runs on pushes to `main` so the default branch always has a status.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. when new commits are pushed to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, type-check, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (tsc --noEmit)
        run: pnpm exec tsc --noEmit

      - name: Test (vitest)
        run: pnpm test

      - name: Build frontend
        run: pnpm build

  rust:
    name: Backend (fmt, clippy, test, build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ci

      - name: Format check (cargo fmt)
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Lint (cargo clippy)
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (cargo test)
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Build (cargo build)
        working-directory: src-tauri
        run: cargo build --locked

  # Single check to require in branch protection — succeeds only if all jobs above pass.
  ci-success:
    name: CI Success
    if: always()
    needs: [frontend, rust]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.rust.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
